<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carat Usage Tracker</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --muted: #666666;
      --accent: #0b84ff;
      --border: #e6e6e6;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: system-ui;
    }

    .container {
      max-width: 900px;
      margin: 28px auto;
      padding: 20px;
    }

    .option {
      padding: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      margin-right: 6px;
    }

    .option.selected {
      background: var(--accent);
      color: white;
    }

    .entry {
      background: white;
      padding: 10px;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
    }

    .note { color: var(--muted); }
  </style>
</head>
<body>

<div class="container">
  <h1>Carat Usage Tracker</h1>

  <!-- Auth -->
  <div>
    <input id="email" placeholder="Enter email" />
    <button id="loginBtn">Login</button>
    <button id="logoutBtn" style="display:none;">Logout</button>
    <div id="userInfo" class="note"></div>
  </div>

  <!-- Form -->
  <form id="form">
    <div>
      <button type="button" class="option" data-value="10">10</button>
      <button type="button" class="option" data-value="20">20</button>
      <button type="button" class="option" data-value="30">30</button>
      <button type="button" class="option" data-value="40">40</button>
      <button type="button" class="option" data-value="50">50</button>
    </div>
    <button type="submit">Add</button>
  </form>

  <h3>Total: <span id="total">0</span></h3>

  <div id="entries"></div>
</div>

<script>
  // =========================
  // Supabase
  // =========================
  const supabase = window.supabase.createClient(
    "YOUR_SUPABASE_URL",
    "YOUR_SUPABASE_ANON_KEY"
  );

  // =========================
  // State
  // =========================
  let selected = null;
  let entries = [];

  const options = document.querySelectorAll(".option");
  const entriesDiv = document.getElementById("entries");
  const totalEl = document.getElementById("total");

  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const emailInput = document.getElementById("email");
  const userInfo = document.getElementById("userInfo");

  // =========================
  // Auth
  // =========================
  loginBtn.onclick = async () => {
    const email = emailInput.value;
    if (!email) return alert("Enter email");

    const { error } = await supabase.auth.signInWithOtp({ email });

    if (error) alert(error.message);
    else alert("Check your email!");
  };

  logoutBtn.onclick = async () => {
    await supabase.auth.signOut();
    location.reload();
  };

  async function getUser() {
    const { data } = await supabase.auth.getUser();
    return data.user;
  }

  // =========================
  // Data
  // =========================
  async function loadEntries() {
    const { data, error } = await supabase
      .from("carat_usages")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      console.error(error);
      return [];
    }

    return data;
  }

  async function addEntry(amount) {
    const user = await getUser();
    if (!user) return alert("Login first");

    const { error } = await supabase
      .from("carat_usages")
      .insert([{ user_id: user.id, amount }]);

    if (error) return alert("Failed");

    refresh();
  }

  async function deleteEntry(id) {
    await supabase.from("carat_usages").delete().eq("id", id);
    refresh();
  }

  async function refresh() {
    entries = await loadEntries();
    render();
  }

  // =========================
  // UI
  // =========================
  function render() {
    const total = entries.reduce((a, b) => a + b.amount, 0);
    totalEl.textContent = total;

    if (!entries.length) {
      entriesDiv.innerHTML = '<div class="note">No entries</div>';
      return;
    }

    entriesDiv.innerHTML = "";

    entries.forEach(e => {
      const div = document.createElement("div");
      div.className = "entry";

      div.innerHTML = `
        <div>
          <strong>${e.amount}</strong>
          <div class="note">${new Date(e.created_at).toLocaleString()}</div>
        </div>
        <button onclick="deleteEntry('${e.id}')">Delete</button>
      `;

      entriesDiv.appendChild(div);
    });
  }

  // =========================
  // Selection
  // =========================
  options.forEach(btn => {
    btn.onclick = () => {
      selected = Number(btn.dataset.value);

      options.forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
    };
  });

  document.getElementById("form").onsubmit = e => {
    e.preventDefault();

    if (!selected) return alert("Pick a value");

    addEntry(selected);
  };

  // =========================
  // Init
  // =========================
  async function init() {
    const user = await getUser();

    if (user) {
      loginBtn.style.display = "none";
      logoutBtn.style.display = "inline-block";
      userInfo.textContent = "Logged in as " + user.email;
      await refresh();
    } else {
      entries = [];
      render();
    }
  }

  init();

  // expose delete globally
  window.deleteEntry = deleteEntry;
</script>

</body>
</html>
