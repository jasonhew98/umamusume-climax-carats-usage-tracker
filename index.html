<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <title>Carat Usage Tracker</title>
  </head>
  <body>
    <div class="container">
      <h1>Carat Usage Tracker</h1>

      <div id="auth">
        <h2>Login / Sign Up</h2>
        <input type="email" id="email" placeholder="Email" />
        <input type="password" id="password" placeholder="Password" />
        <button id="login-btn">Login</button>
        <button id="signup-btn">Sign Up</button>
      </div>

      <div id="user-info" style="display: none">
        <h2>Welcome, <span id="user-display"></span></h2>
        <button id="logout-btn">Logout</button>
      </div>

      <div id="form-container">
        <form id="form">
          <label class="form-label">How many carats have you used?</label>
          <div>
            <button type="button" class="option" data-value="10">10</button>
            <button type="button" class="option" data-value="20">20</button>
            <button type="button" class="option" data-value="30">30</button>
            <button type="button" class="option" data-value="40">40</button>
            <button type="button" class="option" data-value="50">50</button>
          </div>
          <div class="divider">or</div>

          <input
            type="number"
            id="manual-amount"
            placeholder="Enter custom amount..."
            min="1"
          />
          <button type="submit">Add</button>
        </form>

        <h3>Total: <span id="total">0</span></h3>
      </div>

      <div id="entries"></div>
      <script type="module" src="main.js"></script>
    </div>
  </body>
</html>
