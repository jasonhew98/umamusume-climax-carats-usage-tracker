<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carat Usage Tracker</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --muted: #666666;
      --accent: #0b84ff;
      --accent-contrast: #ffffff;
      --border: #e6e6e6;
      --radius: 12px;
      --max-width: 900px;
      --option-bg: #ffffff;
      --option-border: #e6e6e6;
      --option-hover: #f0f8ff;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: #222;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: var(--max-width);
      margin: 28px auto;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 1.25rem;
    }

    form {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .options {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Option cards (act like radios) */
    .option {
      appearance: none;
      -webkit-appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 64px;
      height: 56px;
      padding: 8px 14px;
      border-radius: 14px;
      border: 1px solid var(--option-border);
      background: var(--option-bg);
      box-shadow: 0 1px 0 rgba(0,0,0,0.02);
      cursor: pointer;
      font-size: 1rem;
      color: #111;
      transition: transform .06s ease, box-shadow .06s ease, border-color .06s ease;
      user-select: none;
    }

    .option:hover {
      background: var(--option-hover);
      transform: translateY(-2px);
      border-color: #cfe9ff;
    }

    .option:focus {
      outline: none;
      box-shadow: 0 0 0 4px rgba(11,132,255,0.12);
      transform: translateY(-2px);
    }

    .option[aria-checked="true"], .option.selected {
      background: var(--accent);
      color: var(--accent-contrast);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(11,132,255,0.12);
    }

    button[type="submit"] {
      padding: 10px 14px;
      border: none;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .total {
      margin-top: 20px;
      font-size: 1.1rem;
    }

    .entries {
      margin-top: 18px;
    }

    .entry {
      padding: 12px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--border);
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .entry .meta {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .small {
      padding: 8px 10px;
      font-size: 0.9rem;
      border-radius: 6px;
    }

    .note { color: var(--muted); }

    @media (max-width: 520px) {
      .options { width: 100%; gap: 8px; }
      .option { flex: 1 1 48%; min-width: 0; }
      form { flex-direction: column; align-items: stretch; }
      .entry { flex-direction: column; align-items: flex-start; }
      .actions { align-self: stretch; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Carat Usage Tracker</h1>
    </header>

    <form id="caratForm" aria-labelledby="carat-label">
      <div id="carat-label" style="position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden;">
        Choose carats to use
      </div>

      <div class="options" role="radiogroup" aria-labelledby="carat-label">
        <button type="button" class="option" data-value="10" role="radio" aria-checked="false">10</button>
        <button type="button" class="option" data-value="20" role="radio" aria-checked="false">20</button>
        <button type="button" class="option" data-value="30" role="radio" aria-checked="false">30</button>
        <button type="button" class="option" data-value="40" role="radio" aria-checked="false">40</button>
        <button type="button" class="option" data-value="50" role="radio" aria-checked="false">50</button>
      </div>

      <button type="submit">Add</button>
    </form>

    <div class="total">Total Carats Used: <strong id="totalCarats">0</strong></div>

    <div class="entries" id="entryList"></div>
  </div>

  <script>
    // Elements
    const form = document.getElementById('caratForm');
    const optionButtons = Array.from(document.querySelectorAll('.option'));
    const totalCaratsDisplay = document.getElementById('totalCarats');
    const entryList = document.getElementById('entryList');

    // Key in localStorage
    const STORAGE_KEY = 'caratEntries';

    // Allowed values (source of truth)
    const ALLOWED = [10,20,30,40,50];

    // Track selected value (null when none)
    let selectedValue = null;

    // Load entries from localStorage (array of { amount: number, date: ISO })
    let entries = [];
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      entries = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(entries)) entries = [];
    } catch (e) {
      entries = [];
      console.error('Failed to parse stored entries', e);
    }

    function save() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      } catch (e) {
        console.error('Failed to save entries', e);
      }
    }

    function formatDateToLocal(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString();
      } catch (e) {
        return iso;
      }
    }

    function renderEmpty() {
      entryList.innerHTML = '';
      const p = document.createElement('div');
      p.className = 'note';
      p.textContent = 'No entries yet.';
      entryList.appendChild(p);
    }

    function updateDisplay() {
      // Calculate total
      const total = entries.reduce((acc, e) => acc + (Number(e.amount) || 0), 0);
      totalCaratsDisplay.textContent = total;

      // Render entries (newest first)
      if (!entries.length) {
        renderEmpty();
        return;
      }

      entryList.innerHTML = '';
      entries.slice().reverse().forEach((entry, reversedIndex) => {
        const originalIndex = entries.length - 1 - reversedIndex;

        const card = document.createElement('div');
        card.className = 'entry';

        const left = document.createElement('div');
        const amount = document.createElement('div');
        amount.innerHTML = `<strong>${entry.amount} carats</strong>`;
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = formatDateToLocal(entry.date);
        left.appendChild(amount);
        left.appendChild(meta);

        const actions = document.createElement('div');
        actions.className = 'actions';

        const del = document.createElement('button');
        del.type = 'button';
        del.className = 'small';
        del.textContent = 'Delete';
        del.addEventListener('click', () => {
          entries.splice(originalIndex, 1);
          save();
          updateDisplay();
        });

        actions.appendChild(del);

        card.appendChild(left);
        card.appendChild(actions);
        entryList.appendChild(card);
      });
    }

    // Option handling
    function clearSelection() {
      selectedValue = null;
      optionButtons.forEach(btn => {
        btn.classList.remove('selected');
        btn.setAttribute('aria-checked', 'false');
        btn.blur && btn.blur();
      });
    }

    function setSelection(value) {
      selectedValue = value;
      optionButtons.forEach(btn => {
        const v = parseInt(btn.dataset.value, 10);
        if (v === value) {
          btn.classList.add('selected');
          btn.setAttribute('aria-checked', 'true');
          btn.focus();
        } else {
          btn.classList.remove('selected');
          btn.setAttribute('aria-checked', 'false');
        }
      });
    }

    optionButtons.forEach((btn, idx) => {
      btn.addEventListener('click', () => {
        const v = parseInt(btn.dataset.value, 10);
        if (selectedValue === v) {
          // If already selected, toggle off (optional) — here we keep it selected
          // clearSelection();
          setSelection(v);
        } else {
          setSelection(v);
        }
      });

      // keyboard support: Space/Enter to select
      btn.addEventListener('keydown', (ev) => {
        if (ev.key === ' ' || ev.key === 'Enter') {
          ev.preventDefault();
          btn.click();
        }
        // Arrow navigation (Left/Up, Right/Down)
        if (ev.key === 'ArrowRight' || ev.key === 'ArrowDown') {
          ev.preventDefault();
          const next = optionButtons[(idx + 1) % optionButtons.length];
          next.focus();
        } else if (ev.key === 'ArrowLeft' || ev.key === 'ArrowUp') {
          ev.preventDefault();
          const prev = optionButtons[(idx - 1 + optionButtons.length) % optionButtons.length];
          prev.focus();
        }
      });
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (selectedValue === null) {
        alert('Please select 10, 20, 30, 40, or 50 carats.');
        return;
      }
      const value = Number(selectedValue);
      if (!ALLOWED.includes(value)) {
        alert('Invalid selection. Please pick one of the visible options.');
        return;
      }
      const date = new Date().toISOString();
      entries.push({ amount: value, date });
      save();
      // Reset selection
      clearSelection();
      updateDisplay();
    });

    // Initial render
    updateDisplay();
  </script>
</body>
</html>
