<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carat Usage Tracker</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --muted: #666666;
      --accent: #0b84ff;
      --accent-contrast: #ffffff;
      --border: #e6e6e6;
      --radius: 12px;
      --max-width: 900px;
      --option-bg: #ffffff;
      --option-border: #e6e6e6;
      --option-hover: #f0f8ff;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: #222;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: var(--max-width);
      margin: 28px auto;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 1.25rem;
    }

    form {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .options {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Option cards (act like radios) */
    .option {
      appearance: none;
      -webkit-appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 64px;
      height: 56px;
      padding: 8px 14px;
      border-radius: 14px;
      border: 1px solid var(--option-border);
      background: var(--option-bg);
      box-shadow: 0 1px 0 rgba(0,0,0,0.02);
      cursor: pointer;
      font-size: 1rem;
      color: #111;
      transition: transform .06s ease, box-shadow .06s ease, border-color .06s ease;
      user-select: none;
    }

    .option:hover {
      background: var(--option-hover);
      transform: translateY(-2px);
      border-color: #cfe9ff;
    }

    .option:focus {
      outline: none;
      box-shadow: 0 0 0 4px rgba(11,132,255,0.12);
      transform: translateY(-2px);
    }

    .option[aria-checked="true"], .option.selected {
      background: var(--accent);
      color: var(--accent-contrast);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(11,132,255,0.12);
    }

    button[type="submit"] {
      padding: 10px 14px;
      border: none;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .total {
      margin-top: 20px;
      font-size: 1.1rem;
    }

    .entries {
      margin-top: 18px;
    }

    .entry {
      padding: 12px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--border);
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .entry .meta {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .small {
      padding: 8px 10px;
      font-size: 0.9rem;
      border-radius: 6px;
    }

    .note { color: var(--muted); }

    @media (max-width: 520px) {
      .options { width: 100%; gap: 8px; }
      .option { flex: 1 1 48%; min-width: 0; }
      form { flex-direction: column; align-items: stretch; }
      .entry { flex-direction: column; align-items: flex-start; }
      .actions { align-self: stretch; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Carat Usage Tracker</h1>

  <!-- Auth -->
  <div>
    <input id="email" placeholder="Enter email" />
    <button id="loginBtn">Login</button>
    <button id="logoutBtn" style="display:none;">Logout</button>
    <div id="userInfo" class="note"></div>
  </div>

  <!-- Form -->
  <form id="form">
    <div>
      <button type="button" class="option" data-value="10">10</button>
      <button type="button" class="option" data-value="20">20</button>
      <button type="button" class="option" data-value="30">30</button>
      <button type="button" class="option" data-value="40">40</button>
      <button type="button" class="option" data-value="50">50</button>
    </div>
    <button type="submit">Add</button>
  </form>

  <h3>Total: <span id="total">0</span></h3>

  <div id="entries"></div>
</div>

<script>
  // =========================
  // Supabase
  // =========================
  const supabase = window.supabase.createClient(
    "https://hvhjoyiehmkdovgpytas.supabase.co",
    "sb_publishable_y-kXTtuvPcBrkQxQTWdRKQ_eIPRTY7R"
  );

  // =========================
  // State
  // =========================
  let selected = null;
  let entries = [];

  const options = document.querySelectorAll(".option");
  const entriesDiv = document.getElementById("entries");
  const totalEl = document.getElementById("total");

  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const emailInput = document.getElementById("email");
  const userInfo = document.getElementById("userInfo");

  // =========================
  // Auth
  // =========================
  loginBtn.onclick = async () => {
    const email = emailInput.value;
    if (!email) return alert("Enter email");

    const { error } = await supabase.auth.signInWithOtp({ email });

    if (error) alert(error.message);
    else alert("Check your email!");
  };

  logoutBtn.onclick = async () => {
    await supabase.auth.signOut();
    location.reload();
  };

  async function getUser() {
    const { data } = await supabase.auth.getUser();
    return data.user;
  }

  // =========================
  // Data
  // =========================
  async function loadEntries() {
    const { data, error } = await supabase
      .from("carat_usages")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      console.error(error);
      return [];
    }

    return data;
  }

  async function addEntry(amount) {
    const user = await getUser();
    if (!user) return alert("Login first");

    const { error } = await supabase
      .from("carat_usages")
      .insert([{ user_id: user.id, amount }]);

    if (error) return alert("Failed");

    refresh();
  }

  async function deleteEntry(id) {
    await supabase.from("carat_usages").delete().eq("id", id);
    refresh();
  }

  async function refresh() {
    entries = await loadEntries();
    render();
  }

  // =========================
  // UI
  // =========================
  function render() {
    const total = entries.reduce((a, b) => a + b.amount, 0);
    totalEl.textContent = total;

    if (!entries.length) {
      entriesDiv.innerHTML = '<div class="note">No entries</div>';
      return;
    }

    entriesDiv.innerHTML = "";

    entries.forEach(e => {
      const div = document.createElement("div");
      div.className = "entry";

      div.innerHTML = `
        <div>
          <strong>${e.amount}</strong>
          <div class="note">${new Date(e.created_at).toLocaleString()}</div>
        </div>
        <button onclick="deleteEntry('${e.id}')">Delete</button>
      `;

      entriesDiv.appendChild(div);
    });
  }

  // =========================
  // Selection
  // =========================
  options.forEach(btn => {
    btn.onclick = () => {
      selected = Number(btn.dataset.value);

      options.forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
    };
  });

  document.getElementById("form").onsubmit = e => {
    e.preventDefault();

    if (!selected) return alert("Pick a value");

    addEntry(selected);
  };

  // =========================
  // Init
  // =========================
  async function init() {
    const user = await getUser();

    if (user) {
      loginBtn.style.display = "none";
      logoutBtn.style.display = "inline-block";
      userInfo.textContent = "Logged in as " + user.email;
      await refresh();
    } else {
      entries = [];
      render();
    }
  }

  init();

  // expose delete globally
  window.deleteEntry = deleteEntry;
</script>

</body>
</html>
